app = "kryzen-bot"
primary_region = "fra"

[build]
  builder = "NIXPACKS"

[run]
  cmd = "python bot.py"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[env]
  PYTHON_VERSION = "3.11"
  API_URL = "https://bepulsmm.x404.uz/bot.php"
  AUTO_SERVICE_ID = "42"
  AUTO_QUANTITY = "50"
  AUTO_INTERVAL = "10"
  REQUEST_LIMIT_PER_KEY = "20"
